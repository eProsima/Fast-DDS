    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Get Fast DDS Pro build artifacts
        uses: ./src/fastdds/.github/actions/linux/get-artifact
        with:
          name: fastdds_pro_build_${{ inputs.label }}_${{ github.run_id }}
          artifacts-folder-path: /tmp/artifacts
          destination-folder-path: ${{ env.WORKSPACE }}

      - name: Install apt dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            libasio-dev
            libbz2-dev
            libtinyxml2-dev
            libssl-dev
            python3
            python3-pip
            python3-venv
            zlib1g-dev
          update: false
          upgrade: false

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: |
            msparser
            vcstool
            xmlschema
          upgrade: false

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Sync osrf/osrf_testing_tools_cpp repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          repository: osrf/osrf_testing_tools_cpp
          path: src/osrf_testing_tools_cpp
          ref: 2.3.0

      - name: OSRF testing tools build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ''
          colcon_build_args: ${{ inputs.colcon-args }} --packages-select osrf_testing_tools_cpp
          cmake_args: -DBUILD_TESTING=OFF ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ''
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace: ${{ env.WORKSPACE }}

      - name: Profilling tests build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DPROFILING_TESTS=ON  ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}
        if: ${{ !cancelled() }}

      - name: Clean workspace - Profiling tests
        run: |
          rm -rf src/osrf_testing_tools_cpp
        if: ${{ always() }}

      - name: No security colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DSECURITY=OFF ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: No statistics colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DFASTDDS_STATISTICS=OFF ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      # No .metas file, so FASTDDS_ENFORCE_LOG_INFO is set OFF by default. Missed important args are manually included
      - name: No enforcing log info colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ''
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DBUILD_TESTING=OFF -DCOMPILE_EXAMPLES=ON ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: No shared libs colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DBUILD_SHARED_LIBS=OFF ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: Null dereference colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DCMAKE_CXX_FLAGS_INIT="-Wnull-dereference" -DSECURITY=ON -DFASTDDS_STATISTICS=ON ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          # Force to build with maximum compiler optimization to catch all 'null-dereference' errors
          cmake_build_type: Release
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: Vanilla colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_build_args: --cmake-clean-cache --packages-select fastdds
          cmake_build_type: ${{ env.cmake-build-type }}
          cmake_args: -DBUILD_TESTING=OFF ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: No TLS colcon build
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        if: ${{ !cancelled() }}
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds
          cmake_args: -DNO_TLS=ON ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: GCC latest colcon build
        if: ${{ !cancelled() }}
        env:
          DOCKER_HOST: 'tcp://172.17.0.1:2375'
        run: |
          cd ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/docker/ubuntu/alternative_builds
          docker build -t fastdds_gcc_latest -f fastdds_gcc_latest.Dockerfile .
          docker run --rm -v ${{ github.workspace }}:/root fastdds_gcc_latest
          docker rmi fastdds_gcc_latest

      - name: Clean workspace
        run: |
          find ${{ env.WORKSPACE }} -mindepth 1 -maxdepth 1 ! -name src -exec rm -rf -- {} +
        if: ${{ always() }}
