name: Fast DDS Ubuntu CI reusable workflow

on:
  workflow_call:
    inputs:
      runner:
        description: 'The runner to use for the workflow'
        required: true
        type: string
      docker-image:
        description: 'The docker image to use for the workflow'
        required: true
        type: string
      label:
        description: 'ID associated to the workflow'
        required: true
        type: string
      colcon-args:
        description: 'Extra arguments for colcon cli'
        required: false
        type: string
      cmake-args:
        description: 'Extra arguments for cmake cli'
        required: false
        type: string
      ctest-args:
        description: 'Extra arguments for ctest cli'
        required: false
        type: string
      fastdds-pro-branch:
        description: 'Branch or tag of Fast DDS Pro repository (https://github.com/eProsima/Fast-DDS-Pro)'
        required: true
        type: string
      fastcdr-branch:
        description: 'Branch or tag of Fast CDR repository (https://github.com/eProsima/Fast-CDR)'
        required: false
        type: string
        default: 'master'
      security:
        description: 'Enable security features'
        required: false
        type: boolean
        default: true
      run-build:
        description: 'Build Fast DDS Pro (CI skipped otherwise)'
        required: false
        type: boolean
        default: true
      run-tests:
        description: 'Run test suite of Fast DDS, Fast DDS python, and Fast DDS Discovery Server'
        required: false
        type: boolean
        default: true
      use-ccache:
        description: 'Use CCache to speed up the build'
        required: false
        type: boolean
        default: true

env:
  security-cmake-flag: ${{ inputs.security == true && '-DSECURITY=ON' || '-DSECURITY=OFF' }}
  colcon-build-default-cmake-args: '-DCMAKE_CXX_FLAGS_INIT="-Werror -Wunused-value -Woverloaded-virtual -Wsign-compare -Wcast-align -Wlogical-op -Wduplicated-cond -Wrestrict -Wpointer-arith -Wwrite-strings -Wunreachable-code"'
  fastdds-python-branch: 'main'
  fastdds-docs-branch: 'master'
  shapes-demo-branch: 'master'
  discovery-server-branch: 'master'
  cmake-build-type: 'RelWithDebInfo'
  test-skip-args: '-E v6'

defaults:
  run:
    shell: bash

jobs:
  fastdds_pro_build:
    runs-on:
      - ${{ inputs.runner }}
      - linux
      - x64
      - Ubuntu
    container:
      image: ${{ inputs.docker-image }}
      volumes:
        - /shares/github_artifacts/fastdds-pro:/tmp/artifacts
        - /var/lib/jenkins/.ccache:/ccache
    if: ${{ inputs.run-build == true }}
    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Install apt dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            libasio-dev
            libbz2-dev
            libtinyxml2-dev
            libssl-dev
            python3
            python3-pip
            python3-venv
            zlib1g-dev
          update: false
          upgrade: false

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: |
            vcstool
            xmlschema
          path: /vdev
          upgrade: false

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Get Fast CDR branch
        id: get_fastcdr_branch
        uses: eProsima/eProsima-CI/ubuntu/get_related_branch_from_repo@v0
        with:
          remote_repository: eProsima/Fast-CDR
          fallback_branch: ${{ inputs.fastcdr-branch }}

      - name: Download Fast CDR
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          repository: eProsima/Fast-CDR
          path: src/fastcdr
          ref: ${{ steps.get_fastcdr_branch.outputs.deduced_branch }}

      - name: set up git credentials
        run: |
          git config --global credential.helper store
          echo "https://NONE:${{ secrets.FAST_DDS_PRO_TOKEN }}@github.com" > ~/.git-credentials

      - name: Fetch Fast DDS Pro dependencies
        uses: eProsima/eProsima-CI/ubuntu/vcs_import@v0
        with:
          vcs_repos_file: ${{ env.WORKSPACE }}/src/fastdds/fastdds.repos
          destination_workspace: src
          skip_existing: 'true'

      # Compiling Fast DDS tools has a problem with the symbolic link when the artifact is uploaded
      # and downloaded, as it loses its permissions and then the tests fail. To work around this issue,
      # we disable the compilation of the tools here and enable it in the Fast DDS test job.
      - name: Colcon build
        continue-on-error: false
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --packages-ignore bzip2 zlib --packages-up-to fastdds
          cmake_args: ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace: ${{ env.WORKSPACE }}

      - name: Show CCache statistics
        if: ${{ inputs.use-ccache == true }}
        run: |
          ccache --show-stats

      - name: Store build artifacts
        uses: ./src/fastdds/.github/actions/linux/store-artifact
        with:
          name: fastdds_pro_build_${{ inputs.label }}_${{ github.run_id }}
          artifact-path: |
            build
            install
          destination-folder-path: /tmp/artifacts

      - name: Clean workspace
        run: |
          find ${{ env.WORKSPACE }} -mindepth 1 -maxdepth 1 ! -name src -exec rm -rf -- {} +
          rm -rf ${{ env.WORKSPACE }}/src/bzip2 ${{ env.WORKSPACE }}/src/zlib
        if: ${{ always() }}

  fastdds_pro_test:
    needs: fastdds_pro_build
    runs-on:
      - ${{ inputs.runner }}
      - linux
      - x64
      - Ubuntu
    container:
      image: ${{ inputs.docker-image }}
      options: --shm-size=2g
      volumes:
        - /shares/github_artifacts/fastdds-pro:/tmp/artifacts
        - /var/lib/jenkins/.ccache:/ccache
    if: ${{ inputs.run-tests == true }}
    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Get build artifacts
        uses: ./src/fastdds/.github/actions/linux/get-artifact
        with:
          name: fastdds_pro_build_${{ inputs.label }}_${{ github.run_id }}
          artifacts-folder-path: /tmp/artifacts
          destination-folder-path: ${{ env.WORKSPACE }}

      - name: Add FASTDDSHOME variable to env context
        run: |
          echo "FASTDDSHOME=${{ env.WORKSPACE }}/src/fastdds/.github/license" >> $GITHUB_ENV

      - name: Install apt packages
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            libasio-dev
            libbz2-dev
            libtinyxml2-dev
            libssl-dev
            python3
            python3-pip
            python3-venv
            zlib1g-dev

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: |
            psutil
            vcstool
            xmlschema
          path: /vdev

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Set up hosts file for DNS testing
        run: |
          echo "" | tee -a /etc/hosts
          echo "127.0.0.1 localhost.test" | tee -a /etc/hosts
          echo "::1 localhost.test" | tee -a /etc/hosts
          echo "154.56.134.194 www.eprosima.com.test" | tee -a /etc/hosts
          echo "216.58.215.164 www.acme.com.test" | tee -a /etc/hosts
          echo "2a00:1450:400e:803::2004 www.acme.com.test" | tee -a /etc/hosts
          echo "140.82.121.4 www.foo.com.test" | tee -a /etc/hosts
          echo "140.82.121.3 www.foo.com.test" | tee -a /etc/hosts
          echo "ff1e::ffff:efff:1 acme.org.test" | tee -a /etc/hosts

      # TODO(eduponz): Set up libp11 and SoftHSM. NOTE: using SoftHSM requires adding the runner to a group,
      #                which entails logout/login or rebooting the machine. This is not feasible in a CI environment.

      - name: Fetch Fast DDS Pro test CI dependencies
        uses: eProsima/eProsima-CI/ubuntu/vcs_import@v0
        with:
          vcs_repos_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_test.repos
          destination_workspace: src
          skip_existing: 'true'

      - name: Colcon build
        continue-on-error: false
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_test.meta
          colcon_build_args: ${{ inputs.colcon-args }} --packages-select googletest-distribution fastdds
          cmake_args: ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ${{ env.colcon-build-default-cmake-args }}
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: Show CCache statistics
        if: ${{ inputs.use-ccache == true }}
        run: |
          ccache --show-stats

      - name: Colcon test
        id: test
        uses: eProsima/eProsima-CI/ubuntu/colcon_test@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_test.meta
          colcon_test_args: ${{ inputs.colcon-args }}
          colcon_test_args_default: --event-handlers=console_direct+
          ctest_args: ${{ inputs.ctest-args }} ${{ env.test-skip-args }}
          packages_names: fastdds
          venv_path: /vdev
          workspace: ${{ env.WORKSPACE }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          test_report_artifact: ${{ format('test_report_{0}_{1}_{2}', inputs.label, github.job, join(matrix.*, '_')) }}
          upload_test_report_artifact: 'false'

      - name: Fast DDS test summary
        uses: eProsima/eProsima-CI/ubuntu/junit_summary@v0
        if: ${{ !cancelled() }}
        with:
          junit_reports_dir: "${{ steps.test.outputs.ctest_results_path }}"
          print_summary: 'True'
          show_failed: 'True'
          show_disabled: 'False'
          show_skipped: 'False'

      - name: Clean workspace
        run: |
          find ${{ env.WORKSPACE }} -mindepth 1 -maxdepth 1 ! -name src -exec rm -rf -- {} +
        if: ${{ always() }}

  fastdds_pro_python_build:
    needs: fastdds_pro_build
    runs-on:
      - ${{ inputs.runner }}
      - linux
      - x64
      - Ubuntu
    container:
      image: ${{ inputs.docker-image }}
      volumes:
        - /shares/github_artifacts/fastdds-pro:/tmp/artifacts
        - /var/lib/jenkins/.ccache:/ccache
    if: ${{ inputs.security == true }}
    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Get build artifacts
        uses: ./src/fastdds/.github/actions/linux/get-artifact
        with:
          name: fastdds_pro_build_${{ inputs.label }}_${{ github.run_id }}
          artifacts-folder-path: /tmp/artifacts
          destination-folder-path: ${{ env.WORKSPACE }}

      - name: Install apt packages
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            libbz2-1.0
            libtinyxml2-10
            libssl3t64
            python3
            python3-pip
            python3-venv
            swig4.1
            zlib1g

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: xmlschema
          path: /vdev

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Get Fast DDS Python branch
        id: get_fastdds_python_branch
        uses: eProsima/eProsima-CI/ubuntu/get_related_branch_from_repo@v0
        with:
          remote_repository: eProsima/Fast-DDS-python
          fallback_branch: ${{ env.fastdds-python-branch }}

      - name: Download Fast DDS Python repo
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          repository: eProsima/Fast-DDS-python
          path: src/fastdds-python
          ref: ${{ steps.get_fastdds_python_branch.outputs.deduced_branch }}

      - name: Colcon build
        continue-on-error: false
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta
          colcon_build_args: ${{ inputs.colcon-args }} --packages-select fastdds_python
          cmake_args: ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ''
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: Show CCache statistics
        if: ${{ inputs.use-ccache == true }}
        run: |
          ccache --show-stats

      - name: Store build artifacts
        uses: ./src/fastdds/.github/actions/linux/store-artifact
        with:
          name: fastdds_pro_python_build_${{ inputs.label }}_${{ github.run_id }}
          artifact-path: |
            build
            install
          destination-folder-path: /tmp/artifacts

      - name: Clean workspace
        run: |
          find ${{ env.WORKSPACE }} -mindepth 1 -maxdepth 1 ! -name src -exec rm -rf -- {} +
        if: ${{ always() }}

  fastdds_pro_python_test:
    needs: fastdds_pro_python_build
    runs-on:
      - ${{ inputs.runner }}
      - linux
      - x64
      - Ubuntu
    container:
      image: ${{ inputs.docker-image }}
      volumes:
        - /shares/github_artifacts/fastdds-pro:/tmp/artifacts
        - /var/lib/jenkins/.ccache:/ccache
    if: ${{ inputs.security == true && inputs.run-tests == true }}
    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Get build artifacts
        uses: ./src/fastdds/.github/actions/linux/get-artifact
        with:
          name: fastdds_pro_python_build_${{ inputs.label }}_${{ github.run_id }}
          artifacts-folder-path: /tmp/artifacts
          destination-folder-path: ${{ env.WORKSPACE }}

      - name: Add FASTDDSHOME variable to env context
        run: |
          echo "FASTDDSHOME=${{ env.WORKSPACE }}/src/fastdds/.github/license" >> $GITHUB_ENV

      - name: Install apt packages
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            libbz2-1.0
            libtinyxml2-10
            libssl3t64
            python3
            python3-pip
            python3-venv
            swig4.1
            zlib1g

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: xmlschema
          path: /vdev

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Get Fast DDS Python branch for CI Testing
        id: get_fastdds_python_branch
        uses: eProsima/eProsima-CI/ubuntu/get_related_branch_from_repo@v0
        with:
          remote_repository: eProsima/Fast-DDS-python
          fallback_branch: ${{ env.fastdds-python-branch }}

      - name: Colcon build
        continue-on-error: false
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/python_test.meta
          colcon_build_args: ${{ inputs.colcon-args }} --cmake-clean-cache --packages-select fastdds_python
          cmake_args: ${{ env.security-cmake-flag }} ${{ inputs.cmake-args }} ${{ inputs.use-ccache == true && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || ''}}
          cmake_args_default: ''
          cmake_build_type: ${{ env.cmake-build-type }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          workspace: ${{ env.WORKSPACE }}

      - name: Show CCache statistics
        if: ${{ inputs.use-ccache == true }}
        run: |
          ccache --show-stats

      - name: Colcon test
        id: python_test
        uses: eProsima/eProsima-CI/ubuntu/colcon_test@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_test.meta
          colcon_test_args: ${{ inputs.colcon-args }}
          colcon_test_args_default: --event-handlers=console_direct+
          ctest_args: ${{ inputs.ctest-args }} ${{ env.test-skip-args }}
          packages_names: fastdds_python
          venv_path: /vdev
          workspace: ${{ env.WORKSPACE }}
          workspace_dependencies: ${{ env.WORKSPACE }}/install
          test_report_artifact: ${{ format('test_report_{0}_{1}_{2}', inputs.label, github.job, join(matrix.*, '_')) }}
          upload_test_report_artifact: 'false'

      - name: Fast DDS Python test summary
        uses: eProsima/eProsima-CI/ubuntu/junit_summary@v0
        if: ${{ !cancelled() }}
        with:
          junit_reports_dir: "${{ steps.python_test.outputs.ctest_results_path }}"
          print_summary: 'True'
          show_failed: 'True'
          show_disabled: 'False'
          show_skipped: 'False'

      - name: Clean workspace
        run: |
          find ${{ env.WORKSPACE }} -mindepth 1 -maxdepth 1 ! -name src -exec rm -rf -- {} +
        if: ${{ always() }}

  fastdds_pro_docs_test:
    needs: fastdds_pro_python_build
    runs-on:
      - ${{ inputs.runner }}
      - linux
      - x64
      - Ubuntu
    container:
      image: ${{ inputs.docker-image }}
      volumes:
        - /shares/github_artifacts/fastdds-pro:/tmp/artifacts
        - /var/lib/jenkins/.ccache:/ccache
    if: ${{ inputs.security == true }}
    steps:

      - name: Add WORKSPACE variable to env context
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Sync eProsima/Fast-DDS-Pro repository
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          path: src/fastdds
          submodules: true
          ref: ${{ inputs.fastdds-pro-branch }}

      - name: Get Python build artifacts
        uses: ./src/fastdds/.github/actions/linux/get-artifact
        with:
          name: fastdds_pro_python_build_${{ inputs.label }}_${{ github.run_id }}
          artifacts-folder-path: /tmp/artifacts
          destination-folder-path: ${{ env.WORKSPACE }}

      - name: Add FASTDDSHOME variable to env context
        run: |
          echo "FASTDDSHOME=${{ env.WORKSPACE }}/src/fastdds/.github/license" >> $GITHUB_ENV

      - name: Install apt packages
        uses: eProsima/eProsima-CI/ubuntu/install_apt_packages@v0
        with:
          packages: |
            cmake
            doxygen
            imagemagick
            libbz2-1.0
            libenchant-2-2
            libtinyxml2-10
            libssl3t64
            plantuml
            python3
            python3-pip
            python3-venv
            zlib1g

      - name: Install colcon
        uses: eProsima/eProsima-CI/ubuntu/install_colcon@v0
        with:
          path: /vdev

      - name: Install Python dependencies
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          packages: |
            psutil
            xmlschema
            vcstool
          path: /vdev

      - name: Setup CCache
        uses: ./src/fastdds/.github/actions/linux/get-ccache
        if: ${{ inputs.use-ccache == true }}
        with:
          ccache-folder: /ccache

      - name: Get Fast DDS Docs branch
        id: get_fastdds_docs_branch
        uses: eProsima/eProsima-CI/ubuntu/get_related_branch_from_repo@v0
        with:
          remote_repository: eProsima/Fast-DDS-docs
          fallback_branch: ${{ env.fastdds-docs-branch }}

      - name: Download Fast DDS documentation repo
        uses: eProsima/eProsima-CI/external/checkout@v0
        with:
          repository: eProsima/Fast-DDS-docs
          path: src/fastdds-docs
          ref: ${{ steps.get_fastdds_docs_branch.outputs.deduced_branch }}

      - name: Fetch Fast DDS CI dependencies
        if: ${{ inputs.run-tests == true }}
        uses: eProsima/eProsima-CI/ubuntu/vcs_import@v0
        with:
          vcs_repos_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_test.repos
          destination_workspace: src
          skip_existing: 'true'

      - name: Install Fast DDS Docs required python packages
        uses: eProsima/eProsima-CI/ubuntu/install_python_packages@v0
        with:
          path: /vdev
          upgrade: false
          requirements_file_name: src/fastdds-docs/docs/requirements.txt

      - name: Colcon build
        continue-on-error: false
        uses: eProsima/eProsima-CI/ubuntu/colcon_build@v0
        with:
          colcon_meta_file: ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/fastdds_build.meta ${{ env.WORKSPACE }}/src/fastdds/.github/workflows/config/documentation.meta
          colcon_build_args: ${{ inputs.colcon-args }} --packages-select fastdds-docs
